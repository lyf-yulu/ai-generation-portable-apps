<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>飞书生成任务审批工作区</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">LOCAL GENERATION AGENT</p>
        <h1>飞书生成任务审批工作区</h1>
      </div>
      <form id="run-form" class="source-form">
        <label for="source-url">飞书需求文档</label>
        <div class="source-row">
          <input id="source-url" name="source_url" type="url"
            placeholder="https://company.feishu.cn/docx/..." required>
          <button type="submit" class="primary">读取并规划</button>
        </div>
        <p id="legacy-mode-message" class="mode-message" hidden></p>
      </form>
    </header>

    <p id="error-message" class="error-message" role="alert" hidden></p>

    <section id="bitable-panel" class="bitable-panel panel" aria-label="多维表格任务">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">BITABLE TASKS</p>
          <h2>多维表格任务</h2>
        </div>
        <button id="scan-bitable-button" type="button" class="secondary">
          扫描任务
        </button>
      </div>
      <p id="bitable-status" class="mode-message">
        点击扫描，读取需求附件可访问且进度符合扫描规则的记录。
      </p>
      <div id="bitable-task-list" class="bitable-task-list"></div>
    </section>

    <main class="workspace">
      <aside class="trace-panel panel" aria-label="LangGraph 执行信息">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">WORKFLOW</p>
            <h2>节点轨迹</h2>
          </div>
          <span id="status-badge" class="status-badge">尚未创建</span>
        </div>
        <dl class="run-meta">
          <div><dt>当前节点</dt><dd id="current-node">—</dd></div>
          <div><dt>当前状态</dt><dd id="run-status">—</dd></div>
          <div><dt>thread ID</dt><dd id="thread-id">—</dd></div>
          <div><dt>累计耗时</dt><dd id="run-duration">—</dd></div>
        </dl>
        <ol id="event-list" class="event-list"></ol>
        <p id="langsmith-warning" class="privacy-warning" hidden>
          LangSmith 追踪已开启：工作流输入和输出会发送到外部追踪服务。
        </p>
      </aside>

      <section class="review-panel panel" aria-label="任务审批工作区">
        <div class="panel-heading review-heading">
          <div>
            <p class="eyebrow">REVIEW</p>
            <h2 id="document-title">等待提交飞书文档</h2>
          </div>
          <a id="source-link" href="#" target="_blank" rel="noreferrer">查看源文档</a>
        </div>
        <p class="document-meta">文档版本 <span id="document-revision">—</span></p>
        <p id="delivery-target" class="document-meta" hidden></p>
        <p id="document-summary" class="document-summary"></p>
        <p class="document-meta">可编辑提示词、负面约束、生成参数与参考图片。</p>
        <div id="validation-issues" class="validation-issues" hidden></div>
        <div id="review-conflict" class="review-conflict" role="alert" hidden>
          <span id="review-conflict-text"></span>
          <button id="discard-review-draft" type="button" class="quiet-button">
            放弃本地修改并刷新
          </button>
        </div>
        <div id="task-list" class="task-list"></div>

        <div class="feedback-box">
          <label for="reject-feedback">退回意见</label>
          <textarea id="reject-feedback" rows="3"
            placeholder="说明需要重新规划的内容"></textarea>
        </div>
      </section>
    </main>

    <footer class="action-bar">
      <span id="polling-note">每 1 秒自动刷新运行状态</span>
      <div class="action-buttons">
        <button id="retry-delivery-button" type="button" class="secondary">仅重试交付</button>
        <button id="delete-run-button" type="button" class="quiet-button">删除本地运行</button>
        <button id="reject-button" type="button" class="secondary">退回重新规划</button>
        <button id="cancel-button" type="button" class="danger">全部取消</button>
        <button id="approve-button" type="button" class="primary">批准所选任务</button>
      </div>
    </footer>

    <script src="/static/review-state.js" defer></script>
    <script src="/static/bitable-state.js" defer></script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
