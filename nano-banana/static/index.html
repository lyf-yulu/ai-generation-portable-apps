<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nano Banana 多图生成器</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <h1>Nano Banana</h1>
      <form id="jobForm">
        <section class="workspaceBox">
          <h2>主题工作区</h2>
          <label>当前主题
            <input id="workspaceName" placeholder="例如 产品A / 电商图 / 角色设定">
          </label>
          <div class="rowButtons">
            <button id="newWorkspaceBtn" type="button">新主题页</button>
            <button id="duplicateWorkspaceBtn" type="button">复制当前</button>
            <button id="saveWorkspaceBtn" type="button">保存草稿</button>
          </div>
          <p id="workspaceHint" class="hint"></p>
        </section>

        <section>
          <h2>接口</h2>
          <label>API Key
            <input name="api_key" type="password" autocomplete="off" placeholder="留空使用本地配置">
          </label>
          <p id="keyHint" class="hint"></p>
          <label>供应商
            <select name="provider">
              <option value="t8star" selected>T8Star Images API</option>
              <option value="gemini">Chiyun</option>
            </select>
          </label>
          <label>Base URL
            <input name="base_url" value="https://ai.t8star.cn">
          </label>
          <label>输出目录
            <input name="output_dir" placeholder="留空则保存到本程序 outputs 文件夹">
          </label>
          <div class="rowButtons">
            <button id="chooseOutputBtn" type="button">选择目录</button>
            <button id="appOutputBtn" type="button">程序 outputs</button>
            <button id="desktopOutputBtn" type="button">桌面 outputs</button>
            <button id="openOutputBtn" type="button">打开输出目录</button>
            <button id="cleanCacheBtn" type="button">清理缓存</button>
          </div>
        </section>

        <section>
          <h2>参数</h2>
          <label>模式
            <select name="mode">
              <option value="img2img" selected>img2img</option>
              <option value="text2img">text2img</option>
            </select>
          </label>
          <label>模型
            <select name="model">
              <option value="nano-banana-2" selected>nano-banana-2</option>
              <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview</option>
            </select>
          </label>
          <label>自定义模型名（高级）
            <input name="custom_model" placeholder="留空使用上方模型">
          </label>
          <div class="grid2">
            <label>比例
              <select name="aspect_ratio">
                <option value="auto" selected>auto</option>
                <option>1:1</option>
                <option>16:9</option>
                <option>9:16</option>
                <option>4:3</option>
                <option>3:4</option>
                <option>2:3</option>
                <option>3:2</option>
                <option>21:9</option>
                <option>9:21</option>
              </select>
            </label>
            <label>尺寸
              <select name="image_size">
                <option>1K</option>
                <option selected>2K</option>
                <option>4K</option>
              </select>
            </label>
          </div>
          <div class="grid2">
            <label>返回格式
              <select name="response_format">
                <option value="url" selected>url</option>
                <option value="b64_json">b64_json</option>
              </select>
            </label>
            <label>Seed
              <input name="seed" type="number" min="0" max="2147483647" placeholder="随机">
            </label>
          </div>
          <label>生成后 seed
            <select name="control_after_generate">
              <option value="randomize" selected>randomize</option>
              <option value="fixed">fixed</option>
            </select>
          </label>
          <section class="resizeBox">
            <label class="inlineToggle"><input name="resize_enabled" type="checkbox"> 启用 Image Resize</label>
            <div id="resizeControls" class="resizeControls isDisabled">
              <div class="grid2">
                <label>宽度
                  <input name="resize_width" type="number" min="1" max="8192" value="1700" disabled>
                </label>
                <label>高度
                  <input name="resize_height" type="number" min="1" max="8192" value="2500" disabled>
                </label>
              </div>
              <div class="grid2">
                <label>插值
                  <select name="resize_interpolation" disabled>
                    <option value="high" selected>bicubic</option>
                    <option value="medium">bilinear</option>
                    <option value="low">nearest</option>
                  </select>
                </label>
                <label>方法
                  <select name="resize_method" disabled>
                    <option value="stretch" selected>stretch</option>
                    <option value="contain">contain</option>
                    <option value="cover">cover</option>
                  </select>
                </label>
              </div>
              <div class="grid2">
                <label>条件
                  <select name="resize_condition" disabled>
                    <option value="always" selected>always</option>
                    <option value="only_downscale">only downscale</option>
                    <option value="only_upscale">only upscale</option>
                  </select>
                </label>
                <label>multiple_of
                  <input name="resize_multiple_of" type="number" min="0" max="512" value="0" disabled>
                </label>
              </div>
              <p class="hint">勾选后才会在提交生成时处理参考图；不勾选则发送原图。</p>
            </div>
          </section>
          <div class="toggles">
            <label><input name="skip_error" type="checkbox"> 跳过错误</label>
            <label><input name="vary_seed" type="checkbox" checked> 每次 seed +1</label>
          </div>
        </section>

        <section>
          <h2>并发重复</h2>
          <p class="hint">实际生成次数取「重复次数」和「并发数」中较大的值。</p>
          <div class="grid2">
            <label>重复次数
              <input name="repeat_count" type="number" min="1" max="50" value="1">
            </label>
            <label>并发数
              <input name="concurrency" type="number" min="1" max="20" value="1">
            </label>
          </div>
          <div class="grid2">
            <label>轮询秒
              <input name="poll_interval" type="number" min="3" max="120" value="10">
            </label>
            <label>超时秒
              <input name="timeout" type="number" min="60" value="900">
            </label>
          </div>
        </section>

        <button id="submitBtn" type="submit">开始生成</button>

        <section class="archiveBox">
          <h2>存档</h2>
          <label>存档名
            <input name="archive_name" placeholder="例如 产品图_多图参考">
          </label>
          <label>读取存档
            <select id="archiveSelect"></select>
          </label>
          <div class="rowButtons archiveActions">
            <button id="savePresetBtn" type="button">保存为文件</button>
            <button id="loadArchiveBtn" type="button">读取存档</button>
            <button id="deleteArchiveBtn" type="button">删除存档</button>
          </div>
          <p id="presetHint" class="hint"></p>
        </section>
        <button id="clearPresetBtn" class="secondaryWide" type="button">清空当前读取配置</button>
      </form>
    </aside>

    <section class="workspace">
      <div class="tabs">
        <button id="mainTabBtn" class="tabBtn isActive" type="button">生成</button>
        <button id="activityTabBtn" class="tabBtn" type="button">后台记录</button>
      </div>
      <div id="mainView" class="workspaceView">
      <div class="panel">
        <h2>Prompt</h2>
        <textarea name="prompt" form="jobForm" spellcheck="false" placeholder="输入提示词。多图参考可写：参考 Image 1 的人物，参考 Image 2 的背景..."></textarea>
      </div>

      <div class="panel">
        <h2>参考图</h2>
        <div class="uploadGrid refs" id="imageRefs"></div>
      </div>

      <div class="panel">
        <div class="resultHeader">
          <h2>结果</h2>
          <div id="statusText">空闲</div>
        </div>
        <div id="results" class="results"></div>
        <pre id="events"></pre>
      </div>
      </div>

      <div id="activityView" class="workspaceView hidden">
        <div class="panel">
          <div class="resultHeader">
            <h2>后台记录</h2>
            <button id="refreshActivityBtn" class="smallButton" type="button">刷新</button>
          </div>
          <div id="activityStats" class="activityStats"></div>
          <div class="activityLayout">
            <div id="activityList" class="activityList"></div>
            <pre id="activityDetail" class="activityDetail">选择一条记录查看详情</pre>
          </div>
        </div>
      </div>
    </section>
  </main>

  <dialog id="previewDialog" class="previewDialog">
    <button id="closePreviewBtn" type="button" aria-label="关闭">×</button>
    <div id="previewDialogBody"></div>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
