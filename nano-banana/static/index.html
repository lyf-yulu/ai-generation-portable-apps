<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nano Banana 多图生成器</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <h1>Nano Banana</h1>
      <form id="jobForm">
        <section>
          <h2>接口</h2>
          <label>API Key
            <input name="api_key" type="password" autocomplete="off" placeholder="留空使用本地配置">
          </label>
          <p id="keyHint" class="hint"></p>
          <label>Base URL
            <input name="base_url" value="https://ai.t8star.cn">
          </label>
          <label>输出目录
            <input name="output_dir" placeholder="留空则保存到本程序 outputs 文件夹">
          </label>
          <div class="rowButtons">
            <button id="chooseOutputBtn" type="button">选择目录</button>
            <button id="appOutputBtn" type="button">程序 outputs</button>
            <button id="desktopOutputBtn" type="button">桌面 outputs</button>
          </div>
        </section>

        <section>
          <h2>参数</h2>
          <label>模式
            <select name="mode">
              <option value="img2img" selected>img2img</option>
              <option value="text2img">text2img</option>
            </select>
          </label>
          <label>模型
            <select name="model">
              <option value="nano-banana-2" selected>nano-banana-2</option>
              <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview</option>
            </select>
          </label>
          <div class="grid2">
            <label>比例
              <select name="aspect_ratio">
                <option value="auto" selected>auto</option>
                <option>1:1</option>
                <option>16:9</option>
                <option>9:16</option>
                <option>4:3</option>
                <option>3:4</option>
                <option>2:3</option>
                <option>3:2</option>
                <option>21:9</option>
                <option>9:21</option>
              </select>
            </label>
            <label>尺寸
              <select name="image_size">
                <option>1K</option>
                <option selected>2K</option>
                <option>4K</option>
              </select>
            </label>
          </div>
          <div class="grid2">
            <label>返回格式
              <select name="response_format">
                <option value="url" selected>url</option>
                <option value="b64_json">b64_json</option>
              </select>
            </label>
            <label>Seed
              <input name="seed" type="number" min="0" max="2147483647" placeholder="随机">
            </label>
          </div>
          <label>生成后 seed
            <select name="control_after_generate">
              <option value="randomize" selected>randomize</option>
              <option value="fixed">fixed</option>
            </select>
          </label>
          <div class="toggles">
            <label><input name="skip_error" type="checkbox"> 跳过错误</label>
            <label><input name="vary_seed" type="checkbox" checked> 每次 seed +1</label>
          </div>
        </section>

        <section>
          <h2>并发重复</h2>
          <p class="hint">实际生成次数取「重复次数」和「并发数」中较大的值。</p>
          <div class="grid2">
            <label>重复次数
              <input name="repeat_count" type="number" min="1" max="50" value="1">
            </label>
            <label>并发数
              <input name="concurrency" type="number" min="1" max="20" value="1">
            </label>
          </div>
          <div class="grid2">
            <label>轮询秒
              <input name="poll_interval" type="number" min="3" max="120" value="10">
            </label>
            <label>超时秒
              <input name="timeout" type="number" min="60" value="900">
            </label>
          </div>
        </section>

        <button id="submitBtn" type="submit">开始生成</button>

        <section class="archiveBox">
          <h2>存档</h2>
          <label>存档名
            <input name="archive_name" placeholder="例如 产品图_多图参考">
          </label>
          <label>读取存档
            <select id="archiveSelect"></select>
          </label>
          <div class="rowButtons archiveActions">
            <button id="savePresetBtn" type="button">保存为文件</button>
            <button id="loadArchiveBtn" type="button">读取存档</button>
            <button id="deleteArchiveBtn" type="button">删除存档</button>
          </div>
          <p id="presetHint" class="hint"></p>
        </section>
        <button id="clearPresetBtn" class="secondaryWide" type="button">清空当前读取配置</button>
      </form>
    </aside>

    <section class="workspace">
      <div class="panel">
        <h2>Prompt</h2>
        <textarea name="prompt" form="jobForm" spellcheck="false" placeholder="输入提示词。多图参考可写：参考 Image 1 的人物，参考 Image 2 的背景..."></textarea>
      </div>

      <div class="panel">
        <h2>参考图</h2>
        <div class="uploadGrid refs" id="imageRefs"></div>
      </div>

      <div class="panel">
        <div class="resultHeader">
          <h2>结果</h2>
          <div id="statusText">空闲</div>
        </div>
        <div id="results" class="results"></div>
        <pre id="events"></pre>
      </div>
    </section>
  </main>

  <dialog id="previewDialog" class="previewDialog">
    <button id="closePreviewBtn" type="button" aria-label="关闭">×</button>
    <div id="previewDialogBody"></div>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
